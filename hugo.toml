baseURL = "https://aiogeolab.com/"
languageCode = "zh"
defaultContentLanguage = "zh"
timeZone = "Asia/Shanghai"

title = "AioGeoLab | AI 实验室"  # 改为品牌名
theme = "PaperMod"
copyright = "© 2026 TardiAI"

# 启用中文字数统计（添加这行）
hasCJKLanguage = true

enableEmoji = true
enableGitInfo = true
enableRobotsTXT = true
pagination.pagerSize = 10
summaryLength = 150

# 为了hugo自动处理lastmod信息
[frontmatter]
  lastmod = ["lastmod", ":git", "date"]

# 图片处理配置
[imaging]
  resampleFilter = "Lanczos"
  quality = 85
  anchor = "Smart"

[markup]
  [markup.highlight]
    style = "monokai" 
    lineNos = false
    lineNumbersInTable = true   # 行号用表格方式显示（方便复制代码）
    noClasses = true            # 使用内联样式
    guessSyntax = true          # 自动猜测语言
    codeFences = true           # 支持 ``` 代码块
    tabWidth = 4                # Tab 宽度

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      # 允许渲染原始 HTML
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true

[params]
  env = "production"
  description = "追踪、研究、实验、创作并分享海外顶级AI实践者第一手最佳实践的技术类社区"
  keywords = [
    "AIAgent",
    "FDE",
    "GEO",
    "AI Native Company",
    "硅基禅心",
    "生成式引擎优化",
    "AI搜索优化",
    "ChatGPT SEO",
    "AEO",
    "大模型优化",
    "AI搜索"
  ]
  author = "塔迪Tardi"
  
  # Logo 配置 - 左上角显示
  [params.label]
    text = "AI实验室"
    icon = "images/logo.png"
    iconHeight = 35
  
  defaultTheme = "light"
  disableThemeToggle = false
  
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  

  images = ["/images/og-image-1200x630.png"]

  
  # 首页信息 - 中间大横幅
  [params.homeInfoParams]
    Title = "欢迎来到 AioGeoLab | AI实验室 👋"
    Content = "追踪全球顶级AI一手实践洞察，探索AI时代的中小企业AI Native策略"

  # 社交链接
  #[[params.socialIcons]]
  #  name = "twitter"
  #  url = "https://twitter.com/aiogeolab"
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/tardiai"
  
  [[params.socialIcons]]
    name = "rss"
    url = "https://aiogeolab.com/index.xml"

  [[params.socialIcons]]
    name = "wechat"
    url = "/contact/"
    title = "微信 / 联系方式"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:44279@qq.com"
    title = "发送邮件"

# 菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "tardi-geo-judge"
    name = "🎯 判断工程"
    url = "/categories/GEO判断工程/"
    weight = 15
  
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30
  
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 40
  
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 80



[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true

[taxonomies]
  tag = "tags"
  category = "categories"

[services.googleAnalytics]
  ID = "G-27PKQ3EY68"
